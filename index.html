<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-5 rounded-5" style="width: 18rem;">
            <!-- input for read the script -->
            <input type="number" readonly id="counterInput" class="form-control text-center">
            <!-- button control -->
            <div class="buttons d-flex justify-content-center mt-3 gap-3">
                <button class="rounded-1 btn  btn-danger px-3 py-2" id="substract">-</button>
                <button class="rounded-1 btn btn-secondary px-3 py-2" id="reset">Reset</button>
                <button class="rounded-1 btn btn-success px-3 py-2" id="add">+</button>
            </div>
        </div>


    </div>



    <script src="script.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
